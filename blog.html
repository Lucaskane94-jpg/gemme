<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>

  <style>
    body {
      background: #0a0a0a;
      color: #eaeaea;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .post {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }

    .post h2 {
      margin: 0;
      color: #fff;
    }

    .post p {
      color: #aaa;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>Blog</h1>

  <div id="posts"></div>

  <script>
    async function loadPosts() {
      try {
        const res = await fetch('https://api.github.com/repos/LucasKane94-jpg/gemme/contents/posts?ref=main');
        const files = await res.json();

        const container = document.getElementById('posts');
        container.innerHTML = '';

        for (const file of files) {
          if (file.name.endsWith('.md')) {

            const raw = await fetch(file.download_url);
            const text = await raw.text();

            const title = text.match(/title:\s*"(.*?)"/)?.[1] || "No title";
            const description = text.match(/description:\s*"(.*?)"/)?.[1] || "";
            const date = text.match(/date:\s*(.*)/)?.[1] || "";

            const div = document.createElement('div');
            div.classList.add('post');

            div.innerHTML = `
              <h2>${title}</h2>
              <p>${description}</p>
              <small>${date}</small><br><br>
              <a href="#">Leggi articolo</a>
            `;

            container.appendChild(div);
          }
        }

      } catch (error) {
        console.error(error);
        document.getElementById('posts').innerHTML = 'Errore nel caricamento dei post';
      }
    }

    loadPosts();
  </script>

</body>
</html>
