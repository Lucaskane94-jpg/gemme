  <script>
    const REPO   = 'Lucaskane94-jpg/gemme';
    const BRANCH = 'main';
    const ROOT   = 'posts';

    async function fetchMdFiles(path) {
      const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GitHub API ${res.status} — ${path}`);
      const items = await res.json();
      let files = [];
      for (const item of items) {
        if (item.type === 'file' && item.name.endsWith('.md')) files.push(item);
        else if (item.type === 'dir') files = files.concat(await fetchMdFiles(item.path));
      }
      return files;
    }

    async function fetchRaw(filePath) {
      const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${filePath}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Impossibile scaricare ${filePath}`);
      return res.text();
    }

    function parseFrontmatter(raw) {
      const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) return { data: {}, content: raw };
      const data = {};
      for (const line of match[1].split('\n')) {
        const sep = line.indexOf(':');
        if (sep === -1) continue;
        const key = line.slice(0, sep).trim();
        let val = line.slice(sep + 1).trim().replace(/^["']|["']$/g, '');
        data[key] = /^\d{4}-\d{2}-\d{2}/.test(val) ? new Date(val) : val;
      }
      return { data, content: match[2].trim() };
    }

    function fmtDate(d) {
      if (!(d instanceof Date) || isNaN(d)) return '';
      return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function slugFromPath(path) {
      return path.split('/').pop().replace(/\.md$/, '');
    }

    async function loadBlog() {
      const loading  = document.getElementById('loading');
      const errorDiv = document.getElementById('error');
      const grid     = document.getElementById('posts');

      try {
        const files = await fetchMdFiles(ROOT);
        if (files.length === 0) { loading.textContent = 'Nessun post trovato.'; return; }

        const posts = await Promise.all(
          files.map(async (file) => {
            const raw = await fetchRaw(file.path);
            const { data, content } = parseFrontmatter(raw);
            return { ...data, content, path: file.path, slug: slugFromPath(file.path) };
          })
        );

        posts.sort((a, b) => {
          const da = a.date instanceof Date ? a.date : new Date(0);
          const db = b.date instanceof Date ? b.date : new Date(0);
          return db - da;
        });

        loading.style.display = 'none';
        grid.innerHTML = posts.map(post => `
          <a class="post-card" href="post-1.html?slug=${post.slug}" style="text-decoration:none;color:inherit;display:block;">
            <span class="card-tag">${fmtDate(post.date)}</span>
            <h2>${post.title || 'Senza titolo'}</h2>
            ${post.description ? `<p class="desc">${post.description}</p>` : ''}
            <span class="read-more" style="color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:0.1em;font-family:var(--font-mono);">Leggi →</span>
          </a>
        `).join('');

      } catch (err) {
        loading.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `<div style="border:1px solid rgba(255,80,80,0.2);background:rgba(255,80,80,0.05);border-radius:10px;padding:16px;color:#ff8080;font-size:13px;"><strong>Errore</strong><br>${err.message}</div>`;
        console.error(err);
      }
    }

    loadBlog();
  </script>
