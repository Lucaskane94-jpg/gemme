  <link rel="stylesheet" href="style.css">
  <style>
    .blog-page-hero { padding: 48px 0 32px; }
    .blog-section { padding: 0 0 64px; }
    .blog-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 24px; }
    @media(min-width:768px){ .blog-grid{ grid-template-columns: repeat(2,1fr); } }
    @media(min-width:1100px){ .blog-grid{ grid-template-columns: repeat(3,1fr); } }

    .post-card {
      display: block; text-decoration: none; color: inherit;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, var(--panel-strong), var(--panel));
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .post-card:hover {
      border-color: rgba(103,255,212,0.22);
      transform: translateY(-5px);
      box-shadow: 0 0 40px rgba(103,255,212,0.07);
    }
    .post-card-img {
      width: 100%; height: 200px; object-fit: cover;
      display: block; border-bottom: 1px solid var(--line);
    }
    .post-card-img-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, rgba(103,255,212,0.05), rgba(120,80,255,0.08));
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--line);
      font-size: 32px; color: rgba(103,255,212,0.2);
    }
    .post-card-body { padding: 20px; }
    .post-card-date { font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .post-card-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.1; margin-bottom: 10px; color: var(--text); }
    .post-card-desc { font-size: 14px; color: #b2bfce; line-height: 1.6; margin-bottom: 16px; }
    .post-card-read { font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }

    .state-box { padding: 40px 0; color: var(--muted); font-family: var(--font-mono); font-size: 13px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(103,255,212,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to{ transform:rotate(360deg); } }
  </style>
</head>
<body>

  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TMD97R2M" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">GM</a>

        <a href="index.html#about">About</a>
        <a href="index.html#experiments">Experiments</a>
        <a href="index.html#tools">Tools</a>
        <a href="blog.html" class="active">Blog</a>
      </nav>
      <a class="header-cta" href="https://www.linkedin.com/in/gianmarco-m-58ba71167/" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
    </div>
  </header>

  <div class="container">
    <div class="blog-page-hero">
      <span class="eyebrow">Note & riflessioni</span>
      <h1 style="font-family:var(--font-display);font-weight:800;font-size:clamp(48px,10vw,96px);line-height:0.92;letter-spacing:-0.01em;text-transform:uppercase;margin-top:12px;">Blog</h1>

    </div>
  </div>

  <div class="container">
    <div class="blog-section">
      <div id="loading" class="state-box"><span class="spinner"></span>Caricamento post…</div>
      <div id="error" style="display:none"></div>
      <div id="posts" class="blog-grid"></div>
    </div>
  </div>

  <footer class="container footer">
    <div>© 2026 Gianmarco Monaco</div>
    <span class="footer-badge"><span class="footer-badge-icon">✦</span>No WordPress. No Webflow. Just code.</span>
    <a href="https://www.linkedin.com/in/gianmarco-m-58ba71167/" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
  </footer>

  <script>
    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' });
    }

    async function loadBlog() {
      const loading  = document.getElementById('loading');
      const errorDiv = document.getElementById('error');
      const grid     = document.getElementById('posts');

      try {
        // Load from static JSON generated by GitHub Actions
        const res = await fetch('posts-index.json?v=' + Date.now());
        if (!res.ok) throw new Error('posts-index.json non trovato (status ' + res.status + ')');
        const posts = await res.json();

        if (!posts.length) { loading.textContent = 'Nessun post pubblicato.'; return; }

        loading.style.display = 'none';
        grid.innerHTML = posts.map(post => `
          <a class="post-card" href="${post.slug}.html">
            ${post.image
              ? `<img class="post-card-img" src="${post.image}" alt="${post.title}">`
              : `<div class="post-card-img-placeholder">✦</div>`
            }
            <div class="post-card-body">
              <span class="post-card-date">${fmtDate(post.date)}</span>
              <div class="post-card-title">${post.title}</div>
              ${post.description ? `<div class="post-card-desc">${post.description}</div>` : ''}
              <span class="post-card-read">Leggi →</span>
            </div>
          </a>
        `).join('');

      } catch (err) {
        loading.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `<div style="padding:20px;background:rgba(255,80,80,0.05);border:1px solid rgba(255,80,80,0.15);border-radius:12px;color:#ff8080;font-family:var(--font-mono);font-size:13px;">Errore: ${err.message}</div>`;
      }
    }

    loadBlog();
  </script>

</body>
