<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask GM — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050a; --panel: #080b12; --line: #111827;
      --text: #e8edf5; --muted: #4a5568; --accent: #67ffd4;
      --mono: 'IBM Plex Mono', monospace; --body: 'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; overflow: hidden; }
    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px); pointer-events:none; z-index:9999; }

    /* HEADER */
    .hdr { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--line); background:rgba(4,5,10,0.92); backdrop-filter:blur(12px); flex-shrink:0; gap:12px; flex-wrap:wrap; }
    .hdr-left { display:flex; align-items:center; gap:14px; }
    .back-link { font-family:var(--mono); color:var(--muted); text-decoration:none; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
    .back-link:hover { color:var(--accent); }
    .hdr-title { font-family:var(--mono); font-size:13px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); }
    .hdr-sub { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.08em; }
    .status { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* LAYOUT */
    .layout { display:flex; flex-direction:column; height:100vh; }
    .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }

    /* MESSAGES */
    .msg { display:flex; gap:12px; animation:msg-in 0.3s ease; max-width:720px; }
    @keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .msg.user { flex-direction:row-reverse; align-self:flex-end; }
    .msg.assistant { align-self:flex-start; }

    .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; flex-shrink:0; }
    .avatar.gm { background:rgba(103,255,212,0.1); border:1px solid rgba(103,255,212,0.2); color:var(--accent); }
    .avatar.you { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:var(--muted); }

    .bubble { padding:12px 16px; border-radius:12px; font-size:15px; line-height:1.65; max-width:560px; }
    .msg.user .bubble { background:rgba(103,255,212,0.08); border:1px solid rgba(103,255,212,0.14); color:var(--text); border-radius:12px 12px 2px 12px; }
    .msg.assistant .bubble { background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:12px 12px 12px 2px; }

    .bubble strong { color:var(--accent); font-weight:500; }
    .bubble ul { padding-left:18px; margin-top:8px; }
    .bubble li { margin-bottom:4px; }

    /* TYPING */
    .typing-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:typing 1.2s ease infinite; margin:0 2px; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes typing { 0%,100%{opacity:0.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

    /* SUGGESTIONS */
    .suggestions { padding:0 20px 12px; display:flex; gap:8px; flex-wrap:wrap; }
    .suggestion { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:7px 12px; border:1px solid rgba(103,255,212,0.16); border-radius:999px; color:var(--muted); cursor:pointer; transition:all 0.2s; background:rgba(103,255,212,0.03); white-space:nowrap; }
    .suggestion:hover { color:var(--accent); border-color:rgba(103,255,212,0.3); background:rgba(103,255,212,0.07); }

    /* INPUT */
    .input-area { padding:14px 20px; border-top:1px solid var(--line); background:rgba(4,5,10,0.9); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
    textarea { flex:1; background:rgba(0,0,0,0.35); border:1px solid var(--line); border-radius:12px; color:var(--text); font-family:var(--body); font-size:15px; padding:12px 14px; resize:none; outline:none; line-height:1.5; max-height:120px; transition:border-color 0.2s; }
    textarea:focus { border-color:rgba(103,255,212,0.3); }
    textarea::placeholder { color:var(--muted); }
    .send-btn { width:42px; height:42px; border-radius:50%; background:rgba(103,255,212,0.1); border:1px solid rgba(103,255,212,0.22); color:var(--accent); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
    .send-btn:hover { background:rgba(103,255,212,0.18); box-shadow:0 0 16px rgba(103,255,212,0.15); }
    .send-btn:disabled { opacity:0.3; cursor:default; }

    /* WELCOME */
    .welcome { text-align:center; padding:32px 20px; }
    .welcome-icon { font-size:32px; margin-bottom:14px; }
    .welcome h2 { font-family:var(--mono); font-size:18px; color:var(--accent); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
    .welcome p { color:var(--muted); font-size:14px; max-width:400px; margin:0 auto; line-height:1.65; }
  </style>
</head>
<body>

<div class="layout">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-left">
      <a href="index.html" class="back-link">← Back</a>
      <div>
        <div class="hdr-title">Ask GM</div>
        <div class="hdr-sub">AI assistant · Gemini AI Studio</div>
      </div>
    </div>
    <div class="status"><span class="status-dot"></span>Online</div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Ciao, sono GM</h2>
      <p>Puoi chiedermi qualsiasi cosa sul mio percorso professionale, competenze, progetti ed esperienze. Sono qui per rispondere.</p>
    </div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">Cosa sai fare?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Dove hai lavorato?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Quali certificazioni hai?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Parlami di CRO</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Hai esperienza con GTM?</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="input" placeholder="Fai una domanda a Gianmarco..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>

</div>

<script>
  // ── Keyword-based response engine ────────────────────────────
  const RESPONSES = [
    {
      keys: ['ciao','salve','buongiorno','buonasera','hey','hi','hello'],
      reply: `Ciao! Sono Gianmarco Monaco, professionista del Digital Marketing con 8 anni di esperienza. Sono qui per rispondere a qualsiasi domanda sul mio percorso. Da dove vuoi partire? 🙂`
    },
    {
      keys: ['chi sei','chi è','presentati','parlami di te','chi è gianmarco','tell me about'],
      reply: `Mi chiamo Gianmarco Monaco, sono un professionista del **Digital Marketing, CRO & Analytics** con circa 8 anni di esperienza. Attualmente lavoro come **CRO & Martech Supervisor** in Lottomatica Group, dove mi occupo di ottimizzazione della conversione, personalizzazione onsite e growth marketing per i brand Goldbet, Lottomatica e Planetwin365.

Ho un background che spazia dalla CRO al performance marketing, con una forte componente analitica e tecnica — ma mi considero prima di tutto un professionista del marketing, non uno sviluppatore.`
    },
    {
      keys: ['lavori','lavoro','esperienz','dove hai lavorato','carriera','percorso','career'],
      reply: `Ecco il mio percorso in sintesi:

**Pink Agency** (2016–2018) — Digital marketing e campagne advertising per un portfolio diversificato di clienti.`
    },
    {
      keys: ['lottomatica','goldbet','planetwin','attuale','attualmente','oggi'],
      reply: `Dal 2022 lavoro in **Lottomatica Group** come CRO & Martech Supervisor. Il mio ruolo copre tre brand: Goldbet, Lottomatica e Planetwin365.

Mi occupo di ottimizzazione della conversione, customer engagement, personalizzazione onsite e growth marketing, usando i dati per migliorare il customer journey e le performance digitali degli asset aziendali.`
    },
    {
      keys: ['seedble','eni','joule','startup','bettery','innovation'],
      reply: `In **Seedble** (2019–2022) ho ricoperto il ruolo di Growth Marketing & Innovation Advisor, evolvendomi da Marketing Specialist. Ho sviluppato soluzioni di marketing data-driven e fornito consulenza strategica.

Una delle esperienze più significative: come tutor per Seedble ho mentored la startup **Bettery** (riciclo batterie), portandola a vincere la competizione **Eni Joule**.`
    },
    {
      keys: ['gtm','google tag manager','tag manager'],
      reply: `Google Tag Manager è uno degli strumenti con cui lavoro più intensamente. Lo uso per:

- **Manipolazione del DOM** e injection di CSS, JS e HTML
- Gestione trigger e variabili su siti complessi
- Implementazioni su **SPA Angular** — dove bisogna gestire navigazioni dinamiche senza reload
- Tracking avanzato e dataLayer management

Non sono uno sviluppatore, ma a livello tecnico GTM è il mio strumento principale.`
    },
    {
      keys: ['dynamic yield','dy','personalizzaz','targeting','ab test','a/b','sperimentaz'],
      reply: `**Dynamic Yield** è la piattaforma che uso quotidianamente per la personalizzazione onsite. Ho due certificazioni: **Business** e **Technical Personalization Expert**.

Ci costruisco logiche di targeting, contenuti dinamici, test A/B, recommendation e attivazioni onsite orientate alla conversione. È uno degli strumenti su cui ho più esperienza pratica.`
    },
    {
      keys: ['analytics','ga4','google analytics','contentsquare','hotjar','mouseflow','dati','data'],
      reply: `L'analisi dei dati è centrale nel mio lavoro. I tool con cui ho esperienza:

- **GA4** — tracking, eventi, funnel
- **Contentsquare** — ho vinto il titolo di **Worldwide Champion Q3 2024 e Q2 2025**
- **Hotjar, Mouseflow, Glassbox, FullStory** — analisi qualitativa e heatmapping

Uso questi strumenti per leggere comportamenti, identificare attriti e costruire ipotesi di ottimizzazione.`
    },
    {
      keys: ['contentsquare','champion','worldwide','premio','award'],
      reply: `Sì, sono stato riconosciuto come **ContentSquare Worldwide Champion** per il **Q3 2024** e il **Q2 2025** — un riconoscimento che viene assegnato agli utenti più attivi e competenti sulla piattaforma a livello globale. È uno dei risultati di cui vado più fiero.`
    },
    {
      keys: ['cro','conversion','ottimizzaz','funnel','test'],
      reply: `La CRO — Conversion Rate Optimization — è la mia specializzazione principale. Ho iniziato con il mio brand freelance **Futurology** lavorando con PMI e e-commerce, e ho continuato a svilupparla in Lottomatica Group.

Il mio approccio: analisi dei dati → ipotesi → test → misurazione. Non faccio cambiamenti basati sull'intuizione, ma su evidenze concrete.`
    },
    {
      keys: ['meta','facebook','advertising','adv','campagne','ads','roas'],
      reply: `Ho esperienza con **Meta ADV** nella gestione e ottimizzazione di campagne orientate all'acquisizione. Nel mio periodo freelance ho lavorato su e-commerce raggiungendo risultati come **ROAS fino a 34x** e **+72% di entrate** periodo su periodo.

Non è il mio focus principale oggi, ma ho basi solide su struttura inserzioni, ottimizzazione e misurazione conversioni.`
    },
    {
      keys: ['certificaz','certificato','diploma','formazione'],
      reply: `Le mie certificazioni principali:

- Dynamic Yield Business Certification
- Dynamic Yield Technical Personalization Expert
- Google Analytics Advanced
- ContentSquare Certification Expert
- Hotjar Advanced
- Google Tag Manager Fundamentals
- Audience Hub Expert Certification
- Odoo CRM Certified`
    },
    {
      keys: ['studio','università','laurea','master','formazione','luiss','roma tre'],
      reply: `Il mio percorso accademico:

- **Master in E-commerce, Retail e Management** (2020–2021) — Luiss Business School
- **Bachelor in Comunicazione e Marketing** (2013–2015) — Università degli Studi Roma Tre`
    },
    {
      keys: ['sviluppator','programm','coder','coding','codice','developer'],
      reply: `No, non sono uno sviluppatore. Ho competenze tecniche pratiche — so lavorare con HTML, CSS e JavaScript di base, e uso GTM per interventi sul frontend — ma il mio ruolo è sempre stato sul lato marketing e CRO.

Mi considero un professionista del marketing con una buona sensibilità tecnica, che mi permette di dialogare con i team di sviluppo e realizzare alcune implementazioni in autonomia.`
    },
    {
      keys: ['lingua','inglese','spagnolo','italian','language'],
      reply: `Parlo **italiano** come madrelingua, **inglese** a livello B2 e ho una conoscenza base dello **spagnolo**.`
    },
    {
      keys: ['contatt','email','telefono','linkedin','reach','contact'],
      reply: `Puoi contattarmi qui:

📧 gianmarcomon94@gmail.com
📱 +39 3401261637
🔗 linkedin.com/in/gianmarco-m-58ba71167/
🌐 gianmarcomonaco.org`
    },
    {
      keys: ['disponibil','lavoro','opportunità','aperto','open to','cerca lavoro'],
      reply: `Al momento sono impegnato in Lottomatica Group, ma sono sempre aperto a conversazioni interessanti. Se vuoi parlare di opportunità o collaborazioni, il modo migliore è contattarmi via email: **gianmarcomon94@gmail.com** oppure su LinkedIn.`
    },
    {
      keys: ['progett','sito','portfolio','experiments','mortgage','polymarket','chatbot'],
      reply: `Sul mio sito ho raccolto alcuni progetti personali:

- **Questo sito** — costruito in HTML/CSS/JS puro, hostato su Vercel con CMS headless
- **Mortgage Rate Tracker** — tool browser-based per il calcolo dei mutui con scenari Euribor
- **Polymarket bot** — bot di monitoraggio per mercati predittivi (observation mode)
- **Chatbot AI** — questo assistente, costruito con Gemini AI Studio

Sono tutti progetti personali al di fuori del contesto lavorativo.`
    },
    {
      keys: ['ottimov','optimove','crm','retention','lifecycle'],
      reply: `Ho esperienza con **Optimove** per la gestione del CRM e del lifecycle marketing. È uno degli strumenti che uso in Lottomatica per segmentazione, automazioni e customer engagement basato su comportamenti.`
    },
    {
      keys: ['pink','agenzia','agency','prima esperienza'],
      reply: `La mia prima esperienza strutturata è stata in **Pink Agency** (2016–2018), dove gestivo campagne di digital marketing e advertising per un portfolio diversificato di clienti. Il ruolo andava oltre il marketing puro: includeva anche attività commerciali per soluzioni tecnologiche come cloud services, CRM e marketing automation.`
    }
  ];

  const DEFAULT_REPLY = `Domanda interessante! Per ora posso rispondere a domande su: il mio percorso professionale, competenze tecniche, certificazioni, formazione, strumenti che uso e progetti personali. Prova a chiedermi qualcosa di specifico 🙂`;

  function getReply(input) {
    const text = input.toLowerCase().trim();
    for (const item of RESPONSES) {
      if (item.keys.some(k => text.includes(k))) {
        return item.reply;
      }
    }
    return DEFAULT_REPLY;
  }

  // ── UI helpers ─────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    document.getElementById('input').value = btn.textContent;
    document.getElementById('suggestions').style.display = 'none';
    sendMessage();
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'assistant' ? 'gm' : 'you'}`;
    avatar.textContent = role === 'assistant' ? 'GM' : 'Tu';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/

/g, '<br><br>')
      .replace(/
/g, '<br>');
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant'; div.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar gm'; avatar.textContent = 'GM';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    div.appendChild(avatar); div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function sendMessage() {
    const input = document.getElementById('input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text) return;

    document.getElementById('suggestions').style.display = 'none';
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    showTyping();

    // Simulate thinking delay
    setTimeout(() => {
      removeTyping();
      addMessage('assistant', getReply(text));
      btn.disabled = false;
      input.focus();
    }, 600 + Math.random() * 400);
  }
</script>

</body>
</html>
